name: yarnia
description: Audio-first bedtime companion
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  just_audio: ^0.9.36
  path_provider: ^2.1.0
  speech_to_text: ^7.0.0
  wakelock_plus: ^1.2.5
  share_plus: ^12.0.2
  elevenlabs_agents: ^0.6.1
  permission_handler: ^11.3.1
  shared_preferences: ^2.2.0
  sherpa_onnx: ^1.13.2
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  # Deck typography (ideation/results/deck.html): Fraunces for display headlines,
  # Lora for body. Variable TTFs (single file per family spans all weights via the
  # wght axis; Flutter maps fontWeight onto it). Italic ships as its own file.
  fonts:
    - family: Fraunces
      fonts:
        - asset: assets/fonts/Fraunces.ttf
        - asset: assets/fonts/Fraunces-Italic.ttf
          style: italic
    - family: Lora
      fonts:
        - asset: assets/fonts/Lora.ttf
        - asset: assets/fonts/Lora-Italic.ttf
          style: italic
