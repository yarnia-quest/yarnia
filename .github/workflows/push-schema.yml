name: Push InstantDB schema

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "instant/instant.schema.ts"
      - "instant/instant.perms.ts"

# Non-interactive auth uses an InstantDB Personal Access Token (per_...) from dashboard settings.
# Docs: https://www.instantdb.com/docs/platform-api + /docs/cli
jobs:
  push:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: instant
    env:
      INSTANT_ADMIN_TOKEN: ${{ secrets.INSTANT_ADMIN_TOKEN }}
      INSTANT_APP_ID: ${{ secrets.INSTANT_APP_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - name: Push schema
        run: npx instant-cli@latest push schema --app "$INSTANT_APP_ID" --token "$INSTANT_ADMIN_TOKEN" --yes
      - name: Push permissions
        run: npx instant-cli@latest push perms --app "$INSTANT_APP_ID" --token "$INSTANT_ADMIN_TOKEN" --yes
