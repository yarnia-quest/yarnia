name: roast-fix
# Temporary, READ-ONLY diagnostic (no POST / no new scans). Dumps userroast scan recency to judge
# whether ANY repo is being scored successfully lately (i.e. whether cold containers ever happen),
# plus yarnia's full scan history (the 73 -> errors timeline).
on:
  workflow_dispatch:
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Recency + yarnia history (read-only)
        run: |
          set -e
          UA="Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/120 Safari/537.36"
          all=$(curl -sS "https://userroast.com/api/scans" -H "User-Agent: $UA")
          echo "total scan records: $(echo "$all" | jq 'length')"

          echo "=== 25 most RECENT scans (any repo): created_at | status | overall | repo ==="
          echo "$all" | jq -r '
            def slug: ascii_downcase|sub("https?://";"")|sub("(www\\.)?github\\.com/";"");
            sort_by(.created_at // "") | reverse | .[0:25][]
            | "\(.created_at // "?")  \(.status)  \((.overall // .scores.overall))  \(.repo_url|slug)"'

          echo "=== most recent DONE-with-score scan across ALL repos ==="
          echo "$all" | jq -r '
            def slug: ascii_downcase|sub("https?://";"")|sub("(www\\.)?github\\.com/";"");
            map(select(.status=="done" and ((.overall // .scores.overall) != null)))
            | sort_by(.created_at // "") | reverse | .[0:5][]
            | "\(.created_at)  \((.overall // .scores.overall))  \(.repo_url|slug)"'

          echo "=== yarnia full history (oldest -> newest) ==="
          echo "$all" | jq -r '
            map(select(.repo_url|ascii_downcase|test("yarnia-quest/yarnia")))
            | sort_by(.created_at // "")
            | .[] | "\(.created_at // "?")  status=\(.status)  overall=\((.overall // .scores.overall))  job=\(.job_id)  err=\((.error // "")[0:55])"'
