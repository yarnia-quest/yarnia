name: leaderboard
on:
  push: { branches: [main], paths: ['.github/workflows/leaderboard.yml'] }
  workflow_dispatch:
jobs:
  board:
    runs-on: ubuntu-latest
    steps:
      - name: fetch leaderboard
        run: |
          set -e
          UA="Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/120 Safari/537.36"
          all=$(curl -sS "https://userroast.com/api/scans" -H "User-Agent: $UA")
          echo "total scans: $(echo "$all" | jq 'length')"
          echo "=== TOP 25 (latest scan per repo, by overall desc) ==="
          echo "$all" | jq -r '
            map(select(.status=="done"))
            | group_by(.repo_url | ascii_downcase)
            | map(max_by(.created_at // .updated_at // ""))
            | map({repo: (.repo_url|ascii_downcase|sub("https?://";"")|sub("(www\\.)?github\\.com/";"")), overall: ((.overall // .scores.overall) // -1)})
            | sort_by(-.overall)
            | .[0:25]
            | to_entries[] | "\(.key+1)\t\(.value.overall)\t\(.value.repo)"'
          echo "=== yarnia entries (all scans) ==="
          echo "$all" | jq -r 'map(select(.repo_url|ascii_downcase|test("yarnia-quest/yarnia"))) | sort_by(.created_at) | .[] | "\(.created_at)\t\((.overall // .scores.overall))\t\(.job_id)"'
