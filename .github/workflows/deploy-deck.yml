name: Deploy pitch deck (GitHub Pages)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["ideation/results/deck.html"]

# Publish ideation/results/deck.html to GitHub Pages. The deck is a single static
# file; we copy it out as index.html so the bare Pages URL serves it.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Assemble site
        run: |
          mkdir -p _site
          cp ideation/results/deck.html _site/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
